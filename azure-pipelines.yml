trigger:
- main

pool:
  vmImage: ubuntu-latest

stages:
- stage : Build
  jobs:
   - job: FirstJob
     steps:
     - bash : echo Build stage first job
     - bash : echo $(PipelineLevelVariable) Variable
   - job: SecondJob
     steps:
     - bash : echo Build stage Second job

- stage : DevDeploy
  variables :
    environment : Dev
  dependsOn : Build
  jobs:
   - job: DevDeployJob
     steps:
     - bash : echo $(environment)Deploy Variable

- stage : QADelpoy
  variables :
    environment : QA
  dependsOn : Build
  jobs:
   - job: QADelpoyJob
     steps:
     - bash : echo $(environment)Delpoy Variable
     
- stage : ProdDeploy
  variables :
    environment : Prod
  dependsOn : 
  - DevDeploy
  - QADelpoy
  jobs:
   - job: ProdDeployJob
     steps:
     - bash : echo $(environment)Deploy Variable